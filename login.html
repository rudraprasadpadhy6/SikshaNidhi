<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register & Login Page | SikshaNidhi</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background-color: #a5f3f5;
            /* Light cyan from attached image */
            position: relative;
            overflow: hidden;
        }

        /* --- Shadowy Graduates Background Animation --- */
        .graduates-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Semi-transparent dark silhouettes */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAwIiBoZWlnaHQ9IjEwMDAiIHZpZXdCb3g9IjAgMCAxMDAwIDEwMDAiPjxnIGZpbGw9IiMwNTRiNTAiIGZpbGwtb3BhY2l0eT0iMC4wNSI++PC9nPjwvc3ZnPg==');
            background-size: cover;
            background-repeat: repeat;
            z-index: -2;
            animation: graduateLoop 60s linear infinite;
            opacity: 0.6;
        }

        @keyframes graduateLoop {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 -1000px;
            }
        }

        /* Blurred background effect using gradient colors */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 30% 30%, #53c9c2 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, #054b50 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, #a5f3f5 0%, transparent 40%);
            filter: blur(80px);
            z-index: -3;
            animation: moveGradient 20s infinite alternate;
            opacity: 0.7;
        }

        @keyframes moveGradient {
            0% {
                transform: scale(1) translate(0, 0);
            }

            50% {
                transform: scale(1.05) translate(2%, 2%);
            }

            100% {
                transform: scale(1) translate(-2%, -2%);
            }
        }

        /* Dynamic Shining Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: #fff;
            /* Updated to match the new teal glow */
            box-shadow: 0 0 12px 4px rgba(255, 255, 255, 0.9), 0 0 25px 8px rgba(83, 201, 194, 0.8);
            border-radius: 50%;
            animation: float-and-shine linear infinite;
        }

        @keyframes float-and-shine {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
                transform: translateY(-20vh) scale(1.5);
            }

            100% {
                transform: translateY(-40vh) scale(0);
                opacity: 0;
            }
        }

        /* --- Glassmorphism Container --- */
        .form-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.85);
            /* Whiter tint for contrast */
            border: 1px solid rgba(83, 201, 194, 0.6);
            /* Medium teal border */
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1),
                0 0 30px rgba(83, 201, 194, 0.3);
            color: #333;
            transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.3s ease;
            position: absolute;
        }

        .form-container:hover {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12),
                0 0 40px rgba(83, 201, 194, 0.5);
        }

        /* Smooth Hide/Show Transition */
        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(20px) scale(0.95);
        }

        .form-container:not(.hidden) {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0) scale(1);
            z-index: 10;
        }

        .form-container h1 {
            text-align: center;
            font-weight: 600;
            letter-spacing: 4px;
            margin-bottom: 35px;
            font-size: 26px;
            color: #054b50;
            /* Dark teal from attachments */
        }

        /* Error Message Box */
        .error-message {
            background-color: rgba(217, 39, 78, 0.1);
            border: 1px solid #d9274e;
            color: #d9274e;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: none;
        }

        .error-message.show {
            opacity: 1;
            display: block;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(83, 201, 194, 0.6);
            /* Medium teal */
            border-radius: 12px;
            color: #333;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:disabled {
            background: rgba(220, 220, 220, 0.4);
            cursor: not-allowed;
            color: #999;
        }

        .input-group input:focus:not(:disabled) {
            border-color: #53c9c2;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 15px rgba(83, 201, 194, 0.4);
        }

        .input-group input::placeholder {
            color: #6b7280;
        }

        /* Eye Icon */
        .eye-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6b7280;
            font-size: 18px;
            user-select: none;
        }

        /* Checkbox Area */
        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #555;
        }

        .remember-me input {
            margin-right: 10px;
            accent-color: #054b50;
            /* Dark teal accent */
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Main Button */
        .action-btn {
            width: 100%;
            padding: 16px;
            /* Gradient matching the attached images (Medium Teal to Dark Teal) */
            background: linear-gradient(135deg, #53c9c2 0%, #054b50 100%);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(5, 75, 80, 0.4);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(5, 75, 80, 0.6);
        }

        /* --- Logo & App Name Container --- */
        .app-header {
            position: absolute;
            top: 25px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            /* Space between logo and text */
            z-index: 20;
        }

        .app-logo-img {
            width: 70px;
            /* Adjust based on preference */
            height: 70px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(5, 75, 80, 0.3);
            object-fit: cover;
        }

        .app-name {
            font-size: 50px;
            font-weight: 800;
            color: #054b50;
            /* Dark teal */
            letter-spacing: 2px;
            animation: logoPulse 4s infinite alternate;
        }

        @keyframes logoPulse {
            0% {
                text-shadow: 0 2px 10px rgba(83, 201, 194, 0.4);
            }

            100% {
                text-shadow: 0 5px 25px rgba(83, 201, 194, 0.8), 0 0 15px rgba(255, 255, 255, 0.4);
            }
        }

        /* Bottom Login Link */
        .toggle-link {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }

        .toggle-link a {
            color: #53c9c2;
            /* Medium teal */
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .toggle-link a:hover {
            color: #054b50;
            /* Dark teal */
            text-shadow: 0 0 5px rgba(83, 201, 194, 0.3);
        }

        /* Responsive styling for smaller screens */
        @media (max-width: 600px) {
            .app-header {
                left: 20px;
                top: 15px;
            }

            .app-name {
                font-size: 32px;
            }

            .app-logo-img {
                width: 45px;
                height: 45px;
            }

            .form-container {
                margin: 20px;
                padding: 30px 20px;
                width: calc(100% - 40px);
                top: 80px;
            }
        }
    </style>
</head>

<body>

    <div class="graduates-background"></div>

    <div class="app-header">
        <img src="https://myimgs.org/storage/images/19052/Adobe Express - file.png" alt="SikshaNidhi Logo"
            class="app-logo-img">
        <div class="app-name">SikshaNidhi</div>
    </div>

    <div class="form-container" id="registerSection">
        <h1>WELCOME!</h1>

        <div id="registerError" class="error-message">
            Passwords do not match
        </div>

        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="regName" placeholder="Name" required>
            </div>

            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Password" required>
                <span class="eye-icon" id="toggleRegPassword">👁️</span>
            </div>

            <div class="input-group">
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required disabled>
                <span class="eye-icon" id="toggleRegConfirmPassword">👁️</span>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="regRemember" checked>
                <label for="regRemember">Remember me</label>
            </div>

            <button type="submit" class="action-btn">Register</button>
        </form>

        <div class="toggle-link">
            Already have an account? <a id="showLoginBtn">Login</a>
        </div>
    </div>

    <div class="form-container hidden" id="loginSection">
        <h1>WELCOME BACK!</h1>

        <div id="loginError" class="error-message">
            Incorrect email & password
        </div>

        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Password" required>
                <span class="eye-icon" id="toggleLoginPassword">👁️</span>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="loginRemember" checked>
                <label for="loginRemember">Remember me</label>
            </div>

            <button type="submit" class="action-btn">Login</button>
        </form>

        <div class="toggle-link">
            Don't have an account? <a id="showRegisterBtn">Register</a>
        </div>
    </div>

    <script>
        // --- 1. Toggle forms (Register vs Login) ---
        const registerSection = document.getElementById('registerSection');
        const loginSection = document.getElementById('loginSection');
        const showLoginBtn = document.getElementById('showLoginBtn');
        const showRegisterBtn = document.getElementById('showRegisterBtn');
        const loginError = document.getElementById('loginError');
        const registerError = document.getElementById('registerError');

        function clearErrors() {
            loginError.classList.remove('show');
            registerError.classList.remove('show');
        }

        showLoginBtn.addEventListener('click', () => {
            registerSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
            clearErrors();
        });

        showRegisterBtn.addEventListener('click', () => {
            loginSection.classList.add('hidden');
            registerSection.classList.remove('hidden');
            clearErrors();
        });

        // --- 2. Toggle Password Visibility ---
        function setupPasswordToggle(toggleIconId, passwordInputId) {
            const toggleIcon = document.getElementById(toggleIconId);
            const passwordInput = document.getElementById(passwordInputId);

            toggleIcon.addEventListener('click', function () {
                if (passwordInput.disabled) return;

                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                this.style.opacity = type === 'password' ? '1' : '0.5';
            });
        }

        setupPasswordToggle('toggleRegPassword', 'regPassword');
        setupPasswordToggle('toggleRegConfirmPassword', 'regConfirmPassword');
        setupPasswordToggle('toggleLoginPassword', 'loginPassword');

        // --- 3. Registration Logic (Saving Data & Validating Match) ---
        const registerForm = document.getElementById('registerForm');
        const regPassword = document.getElementById('regPassword');
        const regConfirmPassword = document.getElementById('regConfirmPassword');

        regPassword.addEventListener('input', function () {
            if (this.value.length > 0) {
                regConfirmPassword.disabled = false;
            } else {
                regConfirmPassword.disabled = true;
                regConfirmPassword.value = '';
                registerError.classList.remove('show');
            }
        });

        registerForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = regPassword.value;
            const confirmPassword = regConfirmPassword.value;

            if (password !== confirmPassword) {
                registerError.classList.add('show');
                return;
            }

            registerError.classList.remove('show');
            localStorage.setItem('savedName', name);
            localStorage.setItem('savedEmail', email);
            localStorage.setItem('savedPassword', password);

            registerForm.reset();
            regConfirmPassword.disabled = true;
            registerSection.classList.add('hidden');
            loginSection.classList.remove('hidden');
            clearErrors();

            document.getElementById('loginEmail').value = email;
            alert("Registration Successful! Now you can Login.");
        });

        // --- 4. Login Logic (Checking Data) ---
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const enteredEmail = document.getElementById('loginEmail').value;
            const enteredPassword = document.getElementById('loginPassword').value;

            const savedEmail = localStorage.getItem('savedEmail');
            const savedPassword = localStorage.getItem('savedPassword');

            if (enteredEmail === savedEmail && enteredPassword === savedPassword) {
                loginError.classList.remove('show');
                // Update page to dashboard
                // Assuming showNotification is defined elsewhere or will be added.
                // showNotification('Login successful! Welcome back.', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                loginError.classList.add('show');
            }
        });

        // --- 5. Background Shining Effect ---
        const particlesContainer = document.createElement('div');
        particlesContainer.className = 'particles';
        document.body.insertBefore(particlesContainer, document.body.firstChild);

        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';

            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';
            const size = Math.random() * 5 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';

            particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
            particle.style.animationDelay = (Math.random() * 5) + 's';

            particlesContainer.appendChild(particle);
        }
    </script>
</body>

</html>
